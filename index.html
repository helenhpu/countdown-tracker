<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1D9E75;
      display: inline-block;
      opacity: 0;
      transition: opacity 0.3s;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    .toggle-add {
      background: none;
      border: 0.5px solid #aaa9a4;
      border-radius: 8px;
      padding: 0 16px;
      height: 36px;
      font-size: 14px;
      color: #5f5e5a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toggle-add:hover { background: #eceae4; color: #1a1a18; }

    .add-form-wrap {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 12px;
    }

    .form-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }

    .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }

    input {
      font-family: inherit;
      font-size: 14px;
      height: 36px;
      border: 0.5px solid #aaa9a4;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: #1a1a18;
      outline: none;
    }
    input:focus { box-shadow: 0 0 0 2px #378ADD55; border-color: #378ADD; }

    .form-row input[type="text"] { flex: 1; min-width: 160px; }
    .form-row input[type="number"] { width: 140px; }

    .add-btn {
      background: none;
      border: 0.5px solid #aaa9a4;
      border-radius: 8px;
      padding: 0 20px;
      height: 36px;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
      width: 100%;
      margin-top: 4px;
    }
    .add-btn:hover { background: #eceae4; }
    .add-btn:active { transform: scale(0.98); }

    .ferr { color: #A32D2D; font-size: 13px; margin-top: 6px; }

    .card {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .goal-name { font-size: 15px; font-weight: 500; }

    .delete-btn {
      background: none;
      border: none;
      font-size: 20px;
      color: #888780;
      padding: 0 4px;
      line-height: 1;
    }
    .delete-btn:hover { color: #1a1a18; }

    .counts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      background: #f1efe8;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .metric-label {
      font-size: 11px;
      color: #5f5e5a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-value.done { color: #1D9E75; }
    .metric-value.remaining { color: #378ADD; }

    .progress-bar {
      height: 6px;
      background: #f1efe8;
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      background: #378ADD;
      transition: width 0.4s ease;
    }
    .progress-fill.complete { background: #1D9E75; }

    .chip-row { display: flex; gap: 8px; }
    .chip-row input { flex: 1; }

    .chip-btn {
      background: none;
      border: 0.5px solid #aaa9a4;
      border-radius: 8px;
      padding: 0 16px;
      height: 36px;
      font-size: 14px;
      color: #1a1a18;
      white-space: nowrap;
    }
    .chip-btn:hover { background: #eceae4; }
    .chip-btn:active { transform: scale(0.98); }

    .complete-badge {
      display: inline-block;
      background: #E1F5EE;
      color: #0F6E56;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 8px;
      font-weight: 500;
      margin-top: 5px;
    }

    .empty {
      color: #888780;
      font-size: 14px;
      padding: 3rem 0;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f1efe8; }
      .add-form-wrap, .card { background: #2c2c2a; border-color: #444441; }
      input { background: #2c2c2a; color: #f1efe8; border-color: #5f5e5a; }
      .metric { background: #444441; }
      .metric-label, .delete-btn, .empty { color: #888780; }
      .toggle-add, .add-btn, .chip-btn { color: #d3d1c7; border-color: #5f5e5a; }
      .toggle-add:hover, .add-btn:hover, .chip-btn:hover { background: #444441; color: #f1efe8; }
      .progress-bar { background: #444441; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <h1>Countdown tracker <span id="save-dot" class="save-dot"></span></h1>
      <button class="toggle-add" onclick="toggleForm()">
        <span id="add-icon">+</span>&nbsp;<span id="add-label">New goal</span>
      </button>
    </div>

    <div id="add-form" style="display:none;">
      <div class="add-form-wrap">
        <div class="form-title">Add a new goal</div>
        <div class="form-row">
          <input type="text" id="new-name" placeholder="Goal name (e.g. Monthly squats)" onkeydown="if(event.key==='Enter')addGoal()" />
          <input type="number" id="new-total" placeholder="Target (e.g. 1500)" min="1" onkeydown="if(event.key==='Enter')addGoal()" />
        </div>
        <div id="form-error" class="ferr" style="display:none;"></div>
        <button class="add-btn" onclick="addGoal()">Add goal</button>
      </div>
    </div>

    <div id="goals-list"></div>
    <div id="empty-state" class="empty" style="display:none;">No goals yet — add one above to get started.</div>
  </div>

  <script>
    const STORE_KEY = 'countdown_tracker_goals';
    let goals = [];

    function loadGoals() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) goals = JSON.parse(raw);
      } catch(e) { goals = []; }
      render();
    }

    function saveGoals() {
      try {
        localStorage.setItem(STORE_KEY, JSON.stringify(goals));
        flashSaved();
      } catch(e) {}
    }

    function flashSaved() {
      const dot = document.getElementById('save-dot');
      dot.style.opacity = '1';
      setTimeout(() => { dot.style.opacity = '0'; }, 1200);
    }

    function toggleForm() {
      const f = document.getElementById('add-form');
      const open = f.style.display !== 'none';
      f.style.display = open ? 'none' : 'block';
      document.getElementById('add-icon').textContent = open ? '+' : '×';
      document.getElementById('add-label').textContent = open ? 'New goal' : 'Cancel';
      if (!open) setTimeout(() => document.getElementById('new-name').focus(), 50);
    }

    function addGoal() {
      const name = document.getElementById('new-name').value.trim();
      const total = parseInt(document.getElementById('new-total').value);
      const err = document.getElementById('form-error');
      if (!name) { err.textContent = 'Please enter a goal name.'; err.style.display='block'; return; }
      if (!total || total < 1) { err.textContent = 'Please enter a valid target number.'; err.style.display='block'; return; }
      err.style.display = 'none';
      goals.push({ id: Date.now(), name, total, done: 0 });
      saveGoals();
      document.getElementById('new-name').value = '';
      document.getElementById('new-total').value = '';
      toggleForm();
      render();
    }

    function deleteGoal(id) {
      if (!confirm('Delete this goal?')) return;
      goals = goals.filter(g => g.id !== id);
      saveGoals();
      render();
    }

    function chip(id) {
      const input = document.getElementById('chip-' + id);
      const val = parseInt(input.value);
      if (!val || val < 1) return;
      const g = goals.find(g => g.id === id);
      if (!g) return;
      g.done = Math.min(g.total, g.done + val);
      input.value = '';
      saveGoals();
      render();
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const list = document.getElementById('goals-list');
      const empty = document.getElementById('empty-state');
      if (!goals.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = goals.map(g => {
        const remaining = g.total - g.done;
        const pct = Math.round((g.done / g.total) * 100);
        const complete = remaining === 0;
        return `<div class="card">
          <div class="card-header">
            <div>
              <div class="goal-name">${escHtml(g.name)}</div>
              ${complete ? '<span class="complete-badge">Complete!</span>' : ''}
            </div>
            <button class="delete-btn" onclick="deleteGoal(${g.id})">×</button>
          </div>
          <div class="counts">
            <div class="metric"><div class="metric-label">Target</div><div class="metric-value">${g.total.toLocaleString()}</div></div>
            <div class="metric"><div class="metric-label">Done</div><div class="metric-value done">${g.done.toLocaleString()}</div></div>
            <div class="metric"><div class="metric-label">Left</div><div class="metric-value remaining">${remaining.toLocaleString()}</div></div>
          </div>
          <div class="progress-bar"><div class="progress-fill${complete?' complete':''}" style="width:${pct}%"></div></div>
          ${!complete ? `<div class="chip-row">
            <input type="number" id="chip-${g.id}" placeholder="How many did you do?" min="1" onkeydown="if(event.key==='Enter')chip(${g.id})" />
            <button class="chip-btn" onclick="chip(${g.id})">Log it</button>
          </div>` : ''}
        </div>`;
      }).join('');
    }

    loadGoals();
  </script>
</body>
</html>
